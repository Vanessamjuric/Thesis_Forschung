<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>Search</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #202124;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .top-links {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 18px;
      padding: 18px 24px;
      font-size: 14px;
      color: #3c4043;
    }

    .top-links a:hover {
      text-decoration: underline;
    }

    .app-dot {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .app-dot:hover {
      background: #f1f3f4;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #d2e3fc;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: bold;
      color: #174ea6;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin-top: -60px;
    }

    .center-wrap {
      width: 100%;
      max-width: 720px;
      text-align: center;
      position: relative;
    }

    .brand {
      font-size: 92px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -3px;
      margin-bottom: 28px;
      user-select: none;
    }

    .brand span:nth-child(1) { color: #4285f4; }
    .brand span:nth-child(2) { color: #ea4335; }
    .brand span:nth-child(3) { color: #fbbc05; }
    .brand span:nth-child(4) { color: #4285f4; }
    .brand span:nth-child(5) { color: #34a853; }
    .brand span:nth-child(6) { color: #ea4335; }

    .search-form {
      width: 100%;
      position: relative;
    }

    .search-box {
      width: 100%;
      min-height: 52px;
      border: 1px solid #dfe1e5;
      border-radius: 999px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
      background: #fff;
      position: relative;
      z-index: 3;
    }

    .search-box.open {
      border-radius: 24px 24px 0 0;
      box-shadow: 0 4px 12px rgba(32, 33, 36, 0.14);
      border-bottom: 1px solid transparent;
    }

    .search-box:hover,
    .search-box:focus-within {
      box-shadow: 0 2px 10px rgba(32, 33, 36, 0.14);
      border-color: transparent;
    }

    .search-icon,
    .mic-icon {
      color: hwb(0 100% 0% / 0);
      font-size: 0px;
      flex: 0 0 auto;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      height: 48px;
      font-size: 16px;
      color: #202124;
      padding: 0 14px;
      background: transparent;
    }

    .suggestions {
      position: absolute;
      top: 52px;
      left: 0;
      width: 100%;
      background: #fff;
      border: 1px solid #dfe1e5;
      border-top: none;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 8px 20px rgba(32, 33, 36, 0.14);
      text-align: left;
      overflow: hidden;
      display: none;
      z-index: 2;
    }

    .suggestions.show {
      display: block;
    }

    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      font-size: 16px;
      color: #202124;
      cursor: pointer;
      background: #fff;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: #f1f3f4;
    }

    .suggestion-icon {
      color: #9aa0a6;
      font-size: 15px;
      width: 18px;
      text-align: center;
      flex: 0 0 18px;
    }

    .suggestion-text strong {
      font-weight: 600;
    }

    .button-row {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-btn {
      height: 36px;
      padding: 0 18px;
      border: 1px solid #f8f9fa;
      background: #f8f9fa;
      color: #3c4043;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-btn:hover {
      border-color: #dadce0;
      box-shadow: 0 1px 1px rgba(0, 0, 0, 0.08);
    }

    .note {
      margin-top: 28px;
      font-size: 14px;
      color: #3c4043;
    }

    .footer {
      background: #f2f2f2;
      color: #70757a;
      font-size: 14px;
    }

    .footer-top {
      padding: 15px 30px;
      border-bottom: 1px solid #dadce0;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 15px 30px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .brand {
        font-size: 64px;
      }

      .main {
        margin-top: -30px;
      }

      .top-links {
        gap: 12px;
        padding: 14px 16px;
      }

      .footer-top,
      .footer-bottom {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="top-links">
    <a href="#">Mail</a>
    <a href="#">Bilder</a>
    <div class="app-dot">⋮⋮</div>
    <div class="avatar">V</div>
  </header>

  <main class="main">
    <div class="center-wrap">
      <div class="brand" aria-label="Search">
        <span>S</span><span>e</span><span>a</span><span>r</span><span>c</span><span>h</span>
      </div>

      <form class="search-form" id="searchForm" action="serp-aio.html" method="get" autocomplete="off">
        <div class="search-box" id="searchBox">
          <div class="search-icon">⌕</div>
          <input
            class="search-input"
            type="text"
            name="q"
            id="searchInput"
            placeholder="Suchbegriff eingeben"
            autofocus
          />

            <!-- hier nochmal schauen, warum entweder nur beide Icons oder keins angezeigt wird-->
          <div class="mic-icon">🎤
            <svg viewBox="0 -960 960 960" aria-hidden="true">
              <path d="M480-400q-50 0-85-35t-35-85v-240q0-50 35-85t85-35q50 0 85 35t35 85v240q0 50-35 85t-85 35Zm-40 280v-123q-104-14-172-93t-68-184h80q0 83 58.5 141.5T480-320q83 0 141.5-58.5T680-520h80q0 105-68 184t-172 93v123h-80Z"></path>
            </svg>
          </div>
        </div>


        

        <div class="suggestions" id="suggestions"></div>

        <div class="button-row">
          <button class="search-btn" type="submit">Suchen</button>
          <button class="search-btn" type="button" id="luckyBtn">Auf gut Glück!</button>
        </div>
      </form>

      <!-- 
      <div class="note">
        Demo-Suchmaschine für Studien-, Prototyp- oder Präsentationszwecke
      </div>
      -->
    </div>
  </main>

  <footer class="footer">
    <div class="footer-top">Deutschland</div>
    <div class="footer-bottom">
      <div class="footer-links">
        <a href="#">Über diese Suche</a>
        <a href="#">Werbung</a>
        <a href="#">Business</a>
      </div>
      <div class="footer-links">
        <a href="#">Datenschutz</a>
        <a href="#">Nutzungsbedingungen</a>
        <a href="#">Einstellungen</a>
      </div>
    </div>
  </footer>

  <script>
  const searchInput = document.getElementById("searchInput");
  const suggestions = document.getElementById("suggestions");
  const searchBox = document.getElementById("searchBox");
  const searchForm = document.getElementById("searchForm");
  const luckyBtn = document.getElementById("luckyBtn");

  let selectedIndex = -1;
  let currentSuggestions = [];

  const topicData = {
    insurance: {
      keywords: [
        "versicherung",
        "versicherungen",
        "autoversicherung",
        "krankenversicherung",
        "haftpflicht",
        "haftpflichtversicherung",
        "rechtsschutz",
        "hausratversicherung",
        "lebensversicherung",
        "zusatzversicherung"
      ],
      seeds: [
        "Versicherung",
        "Versicherungen",
        "Versicherung Vergleich",
        "Versicherung online",
        "Versicherung wechseln",
        "Versicherung Kosten",
        "Versicherung Preisvergleich",
        "Versicherung Anbieter",
        "Autoversicherung",
        "Krankenversicherung",
        "Haftpflichtversicherung",
        "Rechtsschutzversicherung",
        "Versicherung Rechner",
        "Versicherung Leistungen"
      ],
      suffixes: [
        "Preisvergleich",
        "Informationen",
        "Anbieter",
        "Kosten",
        "Vergleich",
        "Erfahrungen",
        "Test",
        "Rechner",
        "abschließen",
        "wechseln",
        "Leistungen",
        "Tarife",
        "online",
        "Ratgeber",
        "für Studenten",
        "für Familien"
      ]
    },

    travel: {
      keywords: [
        "reise",
        "reisen",
        "urlaub",
        "flug",
        "hotel",
        "mallorca",
        "italien",
        "spanien",
        "paris",
        "london",
        "last minute"
      ],
      seeds: [
        "Reisen",
        "Urlaub",
        "Reise buchen",
        "Last Minute Urlaub",
        "Flüge vergleichen",
        "Hotel Angebote",
        "Mallorca Urlaub",
        "Italien Rundreise",
        "Städtetrip Paris",
        "Urlaub günstig",
        "Reise Tipps"
      ],
      suffixes: [
        "buchen",
        "günstig",
        "Tipps",
        "Kosten",
        "Erfahrungen",
        "Angebote",
        "Last Minute",
        "mit Kindern",
        "2026",
        "all inclusive",
        "beste Reisezeit",
        "Sehenswürdigkeiten"
      ]
    },

    tech: {
      keywords: [
        "laptop",
        "iphone",
        "android",
        "smartphone",
        "tablet",
        "künstliche intelligenz",
        "ki",
        "chatgpt",
        "notebook",
        "kamera",
        "headset",
        "software"
      ],
      seeds: [
        "Laptop Test",
        "Smartphone Vergleich",
        "iPhone kaufen",
        "Android Tipps",
        "KI Tools",
        "ChatGPT Alternativen",
        "Notebook Test",
        "Tablet Vergleich",
        "beste Kamera 2026",
        "Software kostenlos"
      ],
      suffixes: [
        "Test",
        "Vergleich",
        "kaufen",
        "Erfahrungen",
        "günstig",
        "2026",
        "beste Modelle",
        "für Studenten",
        "für Arbeit",
        "Tipps",
        "Alternativen",
        "Anleitung"
      ]
    },

    brand: {
      keywords: [
        "nike",
        "adidas",
        "apple",
        "ferrero",
        "nutella",
        "pringles",
        "hp",
        "zara",
        "ikea",
        "coca cola",
        "marke",
        "branding"
      ],
      seeds: [
        "Marke Bedeutung",
        "Branding Beispiele",
        "Markenstrategie",
        "Nike neue Kampagne",
        "Apple Produkte",
        "Ferrero Aktionen",
        "Nutella Gewinnspiel",
        "Pringles Sorten",
        "hp Laptop",
        "Brand Awareness"
      ],
      suffixes: [
        "Produkte",
        "Aktion",
        "Gewinnspiel",
        "Kampagne",
        "Strategie",
        "Bedeutung",
        "Beispiele",
        "Erfahrungen",
        "Bewertung",
        "neu"
      ]
    },

    health: {
      keywords: [
        "gesundheit",
        "arzt",
        "symptome",
        "kopfschmerzen",
        "rückenschmerzen",
        "fitness",
        "ernährung",
        "diät",
        "schlaf",
        "stress"
      ],
      seeds: [
        "Gesundheit Tipps",
        "Symptome prüfen",
        "Kopfschmerzen Ursachen",
        "Rückenschmerzen Übungen",
        "Ernährung Plan",
        "Fitness Übungen",
        "besser schlafen",
        "Stress reduzieren"
      ],
      suffixes: [
        "Ursachen",
        "Symptome",
        "Behandlung",
        "Tipps",
        "Übungen",
        "Hausmittel",
        "einfach erklärt",
        "was tun",
        "wann zum Arzt"
      ]
    },

    general: {
      keywords: [],
      seeds: [
        "Definition",
        "Bedeutung",
        "Informationen",
        "Beispiele",
        "einfach erklärt",
        "Vergleich",
        "Tipps",
        "Erfahrungen"
      ],
      suffixes: [
        "Definition",
        "Bedeutung",
        "Informationen",
        "Beispiele",
        "einfach erklärt",
        "Vergleich",
        "Tipps",
        "Erfahrungen",
        "Kosten",
        "Vorteile",
        "Nachteile",
        "Anleitung"
      ]
    }
  };

  function normalizeText(str) {
    return String(str || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  function uniqueArray(arr) {
    return [...new Set(arr.filter(Boolean))];
  }

  function includesNormalized(text, query) {
    return normalizeText(text).includes(normalizeText(query));
  }

  function startsWithNormalized(text, query) {
    return normalizeText(text).startsWith(normalizeText(query));
  }

  function detectTopic(query) {
    const q = normalizeText(query);

    for (const topicName in topicData) {
      if (topicName === "general") continue;

      const topic = topicData[topicName];
      for (let i = 0; i < topic.keywords.length; i++) {
        if (q.includes(normalizeText(topic.keywords[i]))) {
          return topicName;
        }
      }
    }

    return "general";
  }

  function getSeedMatches(query, seeds) {
    const prefixMatches = seeds.filter(item => startsWithNormalized(item, query));
    const containsMatches = seeds.filter(item => {
      return !startsWithNormalized(item, query) && includesNormalized(item, query);
    });

    return [...prefixMatches, ...containsMatches];
  }

  function buildShortSuggestions(query, topic) {
    const trimmed = query.trim();
    const topicSeeds = topicData[topic].seeds;
    const generalSeeds = topicData.general.seeds;

    let results = [];

    results.push(...getSeedMatches(trimmed, topicSeeds));

    if (results.length < 5) {
      results.push(
        `${trimmed} Informationen`,
        `${trimmed} Bedeutung`,
        `${trimmed} online`
      );
    }

    if (results.length < 7) {
      const extraGeneral = getSeedMatches(trimmed, generalSeeds).map(item => `${trimmed} ${item}`);
      results.push(...extraGeneral);
    }

    return uniqueArray(results).slice(0, 8);
  }

  function buildLongSuggestions(query, topic) {
    const trimmed = query.trim();
    const normalized = normalizeText(trimmed);
    const topicSeeds = topicData[topic].seeds;
    const topicSuffixes = topicData[topic].suffixes;
    const generalSuffixes = topicData.general.suffixes;

    let results = [];

    results.push(...getSeedMatches(trimmed, topicSeeds));

    const exactSeedExists = topicSeeds.some(item => normalizeText(item) === normalized);
    if (!exactSeedExists) {
      results.push(trimmed);
    }

    results.push(...topicSuffixes.map(suffix => `${trimmed} ${suffix}`));

    if (results.length < 8) {
      results.push(...generalSuffixes.map(suffix => `${trimmed} ${suffix}`));
    }

    if (trimmed.includes(" ")) {
      results.push(
        `${trimmed} einfach erklärt`,
        `${trimmed} Definition`,
        `${trimmed} Erfahrungen`
      );
    }

    return uniqueArray(results).slice(0, 8);
  }

  function generateSuggestions(query) {
    const trimmed = query.trim();
    if (!trimmed) return [];

    const topic = detectTopic(trimmed);
    const charCount = trimmed.length;

    if (charCount < 3) {
      return uniqueArray([
        trimmed,
        ...buildShortSuggestions(trimmed, topic)
      ]).slice(0, 6);
    }

    if (charCount < 7) {
      return uniqueArray([
        trimmed,
        ...buildShortSuggestions(trimmed, topic)
      ]).slice(0, 8);
    }

    return buildLongSuggestions(trimmed, topic);
  }

  function escapeRegExp(string) {
    return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function highlightMatch(text, query) {
    const trimmed = query.trim();
    if (!trimmed) return text;

    const regex = new RegExp("(" + escapeRegExp(trimmed) + ")", "ig");
    return text.replace(regex, "<strong>$1</strong>");
  }

  function renderSuggestions(items, query) {
    currentSuggestions = items;
    selectedIndex = -1;

    if (!items.length) {
      suggestions.classList.remove("show");
      searchBox.classList.remove("open");
      suggestions.innerHTML = "";
      return;
    }

    suggestions.innerHTML = items.map((item, index) => `
      <div class="suggestion-item" data-index="${index}" data-value="${item}">
        <div class="suggestion-icon">⌕</div>
        <div class="suggestion-text">${highlightMatch(item, query)}</div>
      </div>
    `).join("");

    suggestions.classList.add("show");
    searchBox.classList.add("open");
  }

  function closeSuggestions() {
    suggestions.classList.remove("show");
    searchBox.classList.remove("open");
    selectedIndex = -1;
  }

  function updateActiveSuggestion() {
    const items = suggestions.querySelectorAll(".suggestion-item");
    items.forEach((item, index) => {
      item.classList.toggle("active", index === selectedIndex);
    });
  }

  searchInput.addEventListener("input", function () {
    const query = searchInput.value;
    const items = generateSuggestions(query);
    renderSuggestions(items, query);
  });

  searchInput.addEventListener("focus", function () {
    const query = searchInput.value;
    if (query.trim()) {
      renderSuggestions(generateSuggestions(query), query);
    }
  });

  searchInput.addEventListener("keydown", function (e) {
    const items = suggestions.querySelectorAll(".suggestion-item");

    if (suggestions.classList.contains("show") && items.length) {
      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectedIndex = (selectedIndex + 1) % items.length;
        updateActiveSuggestion();
        return;
      }

      if (e.key === "ArrowUp") {
        e.preventDefault();
        selectedIndex = (selectedIndex - 1 + items.length) % items.length;
        updateActiveSuggestion();
        return;
      }

      if (e.key === "Enter" && selectedIndex >= 0) {
        e.preventDefault();
        searchInput.value = currentSuggestions[selectedIndex];
        searchForm.submit();
        return;
      }

      if (e.key === "Escape") {
        closeSuggestions();
      }
    }
  });

  suggestions.addEventListener("mousedown", function (e) {
    const item = e.target.closest(".suggestion-item");
    if (!item) return;

    const value = item.getAttribute("data-value");
    searchInput.value = value;
    searchForm.submit();
  });

  document.addEventListener("click", function (e) {
    if (!searchForm.contains(e.target)) {
      closeSuggestions();
    }
  });

  luckyBtn.addEventListener("click", function () {
    const query = searchInput.value.trim();
    if (!query) return;
    window.location.href = "serp-aio.html?q=" + encodeURIComponent(query);
  });
</script>
